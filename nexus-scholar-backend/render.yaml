# NEXUS SCHOLAR — Render Blueprint
# Deploy: render.com → New → Blueprint → connect this repo
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nexus-scholar-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon           # Closest free region to Pakistan
    healthCheckPath: /health
    autoDeploy: true         # Auto-deploy on every git push to main

    envVars:
      # ── Injected automatically from Render addons ──────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-scholar-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: redis
          name: nexus-scholar-redis
          property: connectionString

      # ── Set these manually in Render dashboard after deploy ───────────────
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: ANTHROPIC_API_KEY
        sync: false            # Secret — paste in dashboard

      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a secure random value

      - key: FRONTEND_URL
        sync: false            # Paste your Vercel URL after frontend deploy

      # ── Optional: Gmail SMTP for deadline email reminders ─────────────────
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  # ── PostgreSQL — free tier, 1GB storage ────────────────────────────────────
  - name: nexus-scholar-db
    plan: free
    region: oregon
    databaseName: nexus_scholar
    user: nexus

  # ── Redis — free tier, 25MB ────────────────────────────────────────────────
  - name: nexus-scholar-redis
    plan: free
    region: oregon
    ipAllowList: []            # Only allow connections from Render services
